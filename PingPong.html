<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Ping Pong — HTML5 Game</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    html { height: 100dvh; height: 100vh; }
    body { min-height: 100dvh; min-height: 100vh; }
    #gameCanvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" role="application" aria-label="Ping Pong game. Use mouse or touch to move your paddle. First to 5 points wins."></canvas>
  <script type="text/javascript">
(function () {
  'use strict';

  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');

  var canvasLogicalWidth = 800;
  var canvasLogicalHeight = 600;
  var dpr = 1;

  var ballX = 0;
  var ballY = 0;
  var speedX = 8;
  var speedY = 4;

  var playerPaddle = 0;
  var computerPaddle = 0;

  var playerScore = 0;
  var computerScore = 0;
  var gameReset = false;

  var PADDLE_HEIGHT = 100;
  var PADDLE_WIDTH = 15;
  var BALL_RADIUS = 10;
  var WIN_SCORE = 5;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    var w = window.innerWidth;
    var h = Math.max(200, window.innerHeight);
    canvasLogicalWidth = w;
    canvasLogicalHeight = h;

    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);

    playerPaddle = clampPaddle(playerPaddle);
    computerPaddle = clampPaddle(computerPaddle);
    ballX = Math.max(BALL_RADIUS, Math.min(canvasLogicalWidth - BALL_RADIUS, ballX));
    ballY = Math.max(BALL_RADIUS, Math.min(canvasLogicalHeight - BALL_RADIUS, ballY));
  }

  function clampPaddle(y) {
    return Math.max(0, Math.min(canvasLogicalHeight - PADDLE_HEIGHT, y));
  }

  function moveElements() {
    if (gameReset) return;

    var compCenter = computerPaddle + PADDLE_HEIGHT / 2;
    if (compCenter < ballY - 30) computerPaddle += 5;
    else if (compCenter > ballY + 30) computerPaddle -= 5;
    computerPaddle = clampPaddle(computerPaddle);

    ballX += speedX;
    ballY += speedY;

    if (ballX - BALL_RADIUS <= PADDLE_WIDTH) {
      if (ballY > computerPaddle && ballY < computerPaddle + PADDLE_HEIGHT) {
        speedX = -speedX;
        speedY = (ballY - (computerPaddle + PADDLE_HEIGHT / 2)) * 0.2;
      } else {
        playerScore++;
        ballReset();
      }
    }

    if (ballX + BALL_RADIUS >= canvasLogicalWidth - PADDLE_WIDTH) {
      if (ballY > playerPaddle && ballY < playerPaddle + PADDLE_HEIGHT) {
        speedX = -speedX;
        speedY = (ballY - (playerPaddle + PADDLE_HEIGHT / 2)) * 0.2;
      } else {
        computerScore++;
        ballReset();
      }
    }

    if (ballY >= canvasLogicalHeight - BALL_RADIUS || ballY <= BALL_RADIUS) speedY = -speedY;
  }

  function ballReset() {
    if (playerScore >= WIN_SCORE || computerScore >= WIN_SCORE) gameReset = true;
    ballX = canvasLogicalWidth / 2;
    ballY = canvasLogicalHeight / 2;
    speedX = -speedX;
  }

  function colorRect(x, y, w, h, color) {
    ctx.fillStyle = color;
    ctx.fillRect(x, y, w, h);
  }

  function colorCircle(cx, cy, r, color) {
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawNet() {
    var step = 40;
    for (var i = 0; i <= canvasLogicalHeight; i += step) {
      colorRect(canvasLogicalWidth / 2 - 1, i, 2, Math.min(20, step), 'yellow');
    }
  }

  function drawElements() {
    colorRect(0, 0, canvasLogicalWidth, canvasLogicalHeight, 'black');
    drawNet();

    if (gameReset) {
      ctx.fillStyle = 'white';
      var fontSize = Math.min(28, Math.max(16, canvasLogicalWidth / 22));
      ctx.font = fontSize + 'px sans-serif';
      ctx.textAlign = 'center';
      var msgY = canvasLogicalHeight / 2 + 10;
      if (playerScore >= WIN_SCORE) ctx.fillText('YOU WIN', canvasLogicalWidth / 2, msgY);
      else if (computerScore >= WIN_SCORE) ctx.fillText('YOU LOSE', canvasLogicalWidth / 2, msgY);
      ctx.font = (fontSize * 0.7) + 'px sans-serif';
      ctx.fillText('Click or tap to continue', canvasLogicalWidth / 2, msgY + 36);
      return;
    }

    colorRect(canvasLogicalWidth - PADDLE_WIDTH, playerPaddle, PADDLE_WIDTH, PADDLE_HEIGHT, 'red');
    colorRect(0, computerPaddle, PADDLE_WIDTH, PADDLE_HEIGHT, 'blue');
    colorCircle(ballX, ballY, BALL_RADIUS, 'white');

    var scoreFont = Math.min(22, Math.max(14, canvasLogicalWidth / 28));
    ctx.fillStyle = 'white';
    ctx.font = scoreFont + 'px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('Computer: ' + computerScore, 20, 32);
    ctx.textAlign = 'right';
    ctx.fillText('You: ' + playerScore, canvasLogicalWidth - 20, 32);
  }

  function getMouseY(evt) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvasLogicalWidth / rect.width;
    var scaleY = canvasLogicalHeight / rect.height;
    var clientY = evt.clientY != null ? evt.clientY : (evt.touches && evt.touches[0] ? evt.touches[0].clientY : 0);
    return (clientY - rect.top) * scaleY;
  }

  function setPlayerPaddleFromEvent(evt) {
    var y = getMouseY(evt);
    playerPaddle = clampPaddle(y - PADDLE_HEIGHT / 2);
  }

  function handleClick(evt) {
    if (gameReset) {
      playerScore = 0;
      computerScore = 0;
      gameReset = false;
    }
  }

  function gameLoop() {
    moveElements();
    drawElements();
    requestAnimationFrame(gameLoop);
  }

  window.addEventListener('load', function () {
    resize();
    ballX = canvasLogicalWidth / 2;
    ballY = canvasLogicalHeight / 2;
    playerPaddle = (canvasLogicalHeight - PADDLE_HEIGHT) / 2;
    computerPaddle = playerPaddle;

    canvas.addEventListener('mousedown', handleClick);
    canvas.addEventListener('mousemove', setPlayerPaddleFromEvent);

    canvas.addEventListener('touchstart', function (evt) {
      evt.preventDefault();
      setPlayerPaddleFromEvent(evt);
    }, { passive: false });
    canvas.addEventListener('touchmove', function (evt) {
      evt.preventDefault();
      setPlayerPaddleFromEvent(evt);
    }, { passive: false });
    canvas.addEventListener('touchend', function (evt) {
      if (evt.touches.length === 0 && gameReset) handleClick(evt);
    });

    window.addEventListener('resize', resize);

    gameLoop();
  });
})();
  </script>
</body>
</html>
